<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="./img/pokemon-icon.svg" type="image/x-icon">
</head>

<body>
    <h1>Pokedex</h1>
    <div class="search-container">
        <input type="text" id="pokemonSearch" placeholder="Suche Pokémon (ab 3 Zeichen)...">
    </div>
    <div id="pokemonContainer" class="cardLayout"></div>
    <button id="loadMoreBTN">Load more</button>
    <div id="loader" class="hidden">
        <div class="spinner"></div>
    </div>

    <div id="pokemonModal" class="modal hidden">
        
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <button id="prevBtn" class="nav-btn prev">‹</button>
    <button id="nextBtn" class="nav-btn next">›</button>
        <div id="modalBody">
            </div>
    </div>
</div>
    <script src="./script.js"></script>
    <script src="./js/template.js"></script>
</body>

</html>
